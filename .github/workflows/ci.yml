name: CI

on:
  push:
    branches: [ main, develop, "project/**" ]
  pull_request:
    branches: [ main, develop, "project/**" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon
        env:
          GEMINI_API_KEY: ${{ secrets.AIzaSyAJoPFVxOEhK86MCtscJAyVwYCd6PWv2hE }}

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon
        env:
          GEMINI_API_KEY: ${{ secrets.AIzaSyAJoPFVxOEhK86MCtscJAyVwYCd6PWv2hE }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabungin-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk